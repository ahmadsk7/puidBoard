name: Fly Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        working-directory: apps/web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-realtime:
    name: Deploy Realtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        working-directory: apps/realtime
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  notify:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-realtime]
    if: always()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const mergedPr = prs.find(pr => pr.merged_at);
            if (!mergedPr) return;

            const web = '${{ needs.deploy-web.result }}';
            const realtime = '${{ needs.deploy-realtime.result }}';

            const status = (r) => r === 'success' ? 'deployed' : 'failed';
            const body = `**Auto-deployed to Fly.io**\n\nFrontend: ${status(web)}\nBackend: ${status(realtime)}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: mergedPr.number,
              body,
            });
